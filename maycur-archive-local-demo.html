<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每刻档案本地演示产品</title>
  <style>
    :root {
      --mk-primary: #0088ff;
      --mk-primary-hover: #29a2ff;
      --mk-primary-bg: #f2f9ff;
      --mk-page-bg: #f0f2f5;
      --mk-panel: #fff;
      --mk-table-head: #f7f8fa;
      --mk-border: #e5e8ef;
      --mk-border-strong: #d9d9d9;
      --mk-text: rgba(0, 0, 0, 0.85);
      --mk-text-secondary: rgba(0, 0, 0, 0.64);
      --mk-text-tertiary: rgba(0, 0, 0, 0.42);
      --mk-icon: #a3abbe;
      --mk-success: #00ad26;
      --mk-warning: #f7b200;
      --mk-error: #f53137;
      --mk-radius: 2px;
      --mk-topbar: 50px;
      --mk-sidebar: 200px;
      --mk-page-head: 44px;
      --mk-control: 32px;
      --mk-row: 38px;
      --mk-bottom-gap: 12px;
      --mk-bottom-total: 68px;
      --mk-bottom-button: 32px;
      --mk-btn-sm: 24px;
      --mk-btn-md: 32px;
      --mk-btn-lg: 36px;
      --mk-btn-min: 72px;
      --mk-btn-padding-x: 14px;
      --mk-btn-gap: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1100px;
      color: var(--mk-text);
      background: var(--mk-page-bg);
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }

    body.access-gate-locked {
      overflow: hidden;
      background: #f0f2f5;
    }

    body.access-gate-locked .app,
    body.access-gate-locked .table-settings-drawer,
    body.access-gate-locked .global-filter-drawer {
      visibility: hidden;
      pointer-events: none;
    }

    .access-gate {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: linear-gradient(180deg, #f7fbff 0%, #eef2f7 100%);
    }

    body.access-gate-locked .access-gate {
      display: flex;
    }

    .access-gate-card {
      width: 392px;
      padding: 34px 36px 32px;
      border: 1px solid rgba(8, 24, 64, 0.08);
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 10px 28px rgba(8, 24, 64, 0.12);
    }

    .access-gate-logo {
      width: 112px;
      height: 112px;
      display: block;
      margin: -6px auto 18px;
      object-fit: contain;
    }

    .access-gate-title {
      margin: 0 0 8px;
      color: rgba(0, 0, 0, 0.88);
      font-size: 18px;
      font-weight: 600;
      line-height: 26px;
    }

    .access-gate-desc {
      margin: 0 0 24px;
      color: rgba(0, 0, 0, 0.56);
      font-size: 13px;
      line-height: 20px;
    }

    .access-gate-label {
      display: block;
      margin-bottom: 8px;
      color: rgba(0, 0, 0, 0.64);
      font-size: 13px;
      line-height: 20px;
    }

    .access-gate-input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--mk-border-strong);
      border-radius: var(--mk-radius);
      color: var(--mk-text);
      background: #fff;
      font-size: 13px;
      outline: none;
    }

    .access-gate-input:focus {
      border-color: var(--mk-primary);
      box-shadow: 0 0 0 2px rgba(0, 136, 255, 0.12);
    }

    .access-gate-error {
      min-height: 20px;
      margin-top: 8px;
      color: var(--mk-error);
      font-size: 12px;
      line-height: 20px;
      visibility: hidden;
    }

    .access-gate-error.show {
      visibility: visible;
    }

    .access-gate-submit {
      width: 100%;
      height: 36px;
      margin-top: 14px;
      border: 1px solid var(--mk-primary);
      border-radius: var(--mk-radius);
      color: #fff;
      background: var(--mk-primary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .access-gate-submit:hover {
      border-color: var(--mk-primary-hover);
      background: var(--mk-primary-hover);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .mkicon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      line-height: 1;
    }

    .mkicon-svg {
      width: 1em;
      height: 1em;
      overflow: hidden;
      fill: currentColor;
      vertical-align: -0.15em;
    }

    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 30;
      height: var(--mk-topbar);
      display: flex;
      align-items: center;
      background: var(--mk-primary);
      color: #fff;
    }

    .brand {
      width: var(--mk-sidebar);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px 0 29px;
    }

    .brand-logo-link {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .brand-logo-img {
      width: 106px;
      height: 24px;
      display: block;
      object-fit: contain;
    }

    .collapse-icon {
      width: 18px;
      height: 18px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
    }

    .topnav {
      display: flex;
      height: 100%;
      align-items: center;
    }

    .topnav-item {
      position: relative;
      width: 104px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .topnav-item.active {
      color: #fff;
    }

    .topnav-item.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 48px;
      height: 2px;
      border-radius: 2px;
      background: #fff;
      transform: translateX(-50%);
    }

    .top-actions {
      height: 100%;
      margin-left: auto;
      padding-right: 16px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .top-action {
      width: 50px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      font-size: 20px;
    }

    .notification-menu {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .notification-trigger {
      position: relative;
      width: 50px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .notification-trigger-icon {
      display: inline-block;
      background: url("assets/ecm-icons/notification-card-icon.svg") center / contain no-repeat;
    }

    .notification-trigger-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) invert(1);
    }

    .notification-card-icon,
    .notification-list-icon {
      display: inline-block;
      background: url("assets/ecm-icons/notification-card-icon.svg") center / contain no-repeat;
    }

    .notification-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      min-width: 13px;
      height: 13px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      border: 0;
      border-radius: 7px;
      background: var(--mk-error);
      color: #fff;
      font-size: 10px;
      line-height: 13px;
    }

    .notification-badge.show {
      display: inline-flex;
    }

    .notification-popover {
      position: absolute;
      top: 50px;
      right: -145px;
      z-index: 95;
      width: 340px;
      border-radius: var(--mk-radius);
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 35, 60, 0.16);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }

    .notification-popover::before {
      content: "";
      position: absolute;
      top: -7px;
      right: 163px;
      width: 14px;
      height: 14px;
      background: #fff;
      transform: rotate(45deg);
      box-shadow: -2px -2px 3px rgba(15, 35, 60, 0.03);
    }

    .notification-menu.open .notification-popover {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .notification-popover-head {
      position: relative;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--mk-border);
    }

    .notification-popover-title {
      color: rgba(0, 0, 0, 0.88);
      font-size: 14px;
      font-weight: 600;
      line-height: 24px;
    }

    .notification-popover-tabs {
      display: inline-flex;
      align-items: center;
      height: 100%;
      gap: 24px;
    }

    .notification-popover-tab {
      position: relative;
      height: 48px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      border: 0;
      background: transparent;
      color: rgba(0, 0, 0, 0.64);
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
    }

    .notification-popover-tab.active {
      color: var(--mk-primary);
      font-weight: 600;
    }

    .notification-popover-tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: var(--mk-primary);
    }

    .notification-tab-count {
      color: inherit;
      font-size: 13px;
      font-weight: 400;
    }

    .notification-link {
      color: var(--mk-primary);
      font-size: 13px;
      text-decoration: none;
    }

    .notification-popover-list {
      max-height: 240px;
      padding: 0 16px;
      overflow: auto;
    }

    .notification-popover-card {
      position: relative;
      width: calc(100% + 32px);
      min-height: 58px;
      display: block;
      margin: 0 -16px;
      padding: 9px 16px 8px;
      border: 0;
      border-bottom: 1px solid var(--mk-border);
      background: #fff;
      color: var(--mk-text);
      text-align: left;
      cursor: pointer;
    }

    .notification-popover-card:hover {
      background: #f5fbff;
    }

    .notification-card-icon {
      width: 12px;
      height: 12px;
      color: var(--mk-primary);
    }

    .notification-popover-row {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      min-height: 20px;
      column-gap: 6px;
    }

    .notification-popover-type {
      overflow: hidden;
      color: rgba(0, 0, 0, 0.6);
      font-size: 13px;
      line-height: 20px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .notification-popover-time {
      flex-shrink: 0;
      min-width: 120px;
      color: rgba(0, 0, 0, 0.24);
      font-size: 13px;
      line-height: 20px;
      text-align: right;
    }

    .notification-popover-summary {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding-left: 1px;
      color: rgba(0, 0, 0, 0.85);
      font-size: 13px;
      line-height: 18px;
    }

    .notification-popover-summary-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .notification-todo-status {
      flex: 0 0 auto;
      height: 20px;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border-radius: var(--mk-radius);
      background: var(--mk-primary-bg);
      color: var(--mk-primary);
      font-size: 12px;
      line-height: 20px;
    }

    .notification-unread-dot {
      flex: 0 0 auto;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--mk-error);
    }

    .notification-popover-footer {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px 16px;
      border-top: 0;
    }

    .notification-clear {
      width: 100%;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: var(--mk-radius);
      background: var(--mk-primary);
      color: #fff;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }

    .notification-clear:hover {
      background: #0077e6;
      color: #fff;
    }

    .notification-empty {
      height: 292px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 36px;
      color: rgba(0, 0, 0, 0.24);
      font-size: 13px;
    }

    .notification-empty img {
      width: 147px;
      height: 136px;
      margin-bottom: 12px;
      object-fit: contain;
    }

    .message-reminder-page {
      height: calc(100vh - var(--mk-topbar) - var(--mk-page-head) - 24px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 0;
      background: #fff;
    }

    .personal-task-page {
      height: calc(100vh - var(--mk-topbar) - var(--mk-page-head) - 24px);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .message-reminder-list {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
    }

    .message-reminder-card {
      width: 100%;
      min-height: 92px;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr) 150px;
      grid-template-rows: 42px auto;
      column-gap: 16px;
      row-gap: 16px;
      padding: 0 16px 14px;
      border: 0;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.02);
      color: var(--mk-text);
      text-align: left;
      cursor: pointer;
    }

    .message-reminder-card:hover {
      background: #f5fbff;
    }

    .message-reminder-card.active,
    .message-reminder-card.active:hover {
      background: rgba(0, 136, 255, 0.02);
    }

    .notification-list-icon {
      width: 18px;
      height: 18px;
      margin-top: 24px;
      color: var(--mk-primary);
    }

    .message-reminder-content {
      min-width: 0;
      padding-top: 24px;
    }

    .message-reminder-fields {
      display: grid;
      grid-template-columns: repeat(3, 205px);
      align-items: center;
      column-gap: 60px;
      min-height: 18px;
    }

    .message-reminder-field {
      min-width: 0;
      display: flex;
      align-items: center;
      color: rgba(0, 0, 0, 0.85);
      font-size: 13px;
      line-height: 18px;
    }

    .message-reminder-label,
    .message-reminder-summary-label {
      flex-shrink: 0;
      color: rgba(0, 0, 0, 0.6);
    }

    .message-reminder-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .message-status {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--mk-primary);
      font-size: 13px;
    }

    .message-status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .message-status.unread {
      color: var(--mk-error);
    }

    .message-reminder-summary {
      grid-column: 1 / -1;
      display: block;
      overflow: hidden;
      color: rgba(0, 0, 0, 0.85);
      font-size: 13px;
      line-height: 18px;
      max-height: 36px;
    }

    .message-reminder-time {
      min-width: 150px;
      padding-top: 16px;
      color: rgba(0, 0, 0, 0.44);
      font-size: 13px;
      line-height: 18px;
      text-align: right;
      white-space: nowrap;
    }

    .message-reminder-time span {
      display: inline;
    }

    .message-reminder-page .ecm-pagination {
      margin-top: auto;
      border-top: 0;
    }

    .todo-center-page {
      height: calc(100vh - var(--mk-topbar) - var(--mk-page-head) - 24px);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .todo-center-tabs {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 0 12px;
      border-bottom: 1px solid var(--mk-border);
      background: #fff;
    }

    .todo-center-tab {
      position: relative;
      height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(0, 0, 0, 0.64);
      font-size: 13px;
      font-weight: 400;
      text-decoration: none;
    }

    .todo-center-tab.active {
      color: var(--mk-primary);
      font-weight: 600;
    }

    .todo-center-tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: var(--mk-primary);
    }

    .todo-count-badge,
    .menu-badge {
      min-width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border-radius: 8px;
      background: var(--mk-error);
      color: #fff;
      font-size: 11px;
      line-height: 16px;
    }

    .menu-badge {
      margin-left: auto;
    }

    .todo-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--mk-primary);
      white-space: nowrap;
    }

    .todo-status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .todo-status.done {
      color: var(--mk-success);
    }

    .todo-status.removed {
      color: var(--mk-text-tertiary);
    }

    .todo-status.timeout {
      color: var(--mk-error);
    }

    .borrow-detail-page {
      height: calc(100vh - var(--mk-topbar) - var(--mk-page-head) - 24px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 0;
    }

    .borrow-detail-layout {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 12px;
      overflow: hidden;
    }

    .borrow-detail-main,
    .borrow-approval-panel {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--mk-border);
      background: #fff;
    }

    .borrow-detail-main {
      padding: 18px 20px;
    }

    .borrow-approval-panel {
      padding: 16px;
    }

    .borrow-detail-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: rgba(0, 0, 0, 0.88);
      font-size: 16px;
      font-weight: 600;
    }

    .borrow-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 14px 32px;
    }

    .borrow-detail-field {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      align-items: start;
      min-height: 24px;
      color: rgba(0, 0, 0, 0.85);
      font-size: 13px;
      line-height: 22px;
    }

    .borrow-detail-label {
      color: rgba(0, 0, 0, 0.56);
    }

    .borrow-approval-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .approval-flow-link {
      color: var(--mk-primary);
      font-size: 13px;
      font-weight: 400;
      text-decoration: none;
    }

    .approval-step {
      position: relative;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 10px;
      padding-bottom: 18px;
    }

    .approval-step:not(:last-child)::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 18px;
      bottom: 0;
      width: 1px;
      background: var(--mk-border);
    }

    .approval-dot {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      margin-top: 2px;
      border-radius: 50%;
      background: var(--mk-primary);
      box-shadow: inset 0 0 0 4px #dff2ff;
    }

    .approval-step.pending .approval-dot {
      background: var(--mk-warning);
      box-shadow: inset 0 0 0 4px #fff3bf;
    }

    .approval-step.fail .approval-dot {
      background: var(--mk-error);
      box-shadow: inset 0 0 0 4px #ffd6d8;
    }

    .approval-step-title {
      color: rgba(0, 0, 0, 0.85);
      font-size: 13px;
      font-weight: 600;
      line-height: 20px;
    }

    .approval-step-meta {
      margin-top: 4px;
      color: rgba(0, 0, 0, 0.56);
      font-size: 12px;
      line-height: 18px;
    }

    .borrow-form-page {
      height: calc(100vh - var(--mk-topbar) - var(--mk-page-head) - 24px);
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .borrow-form-body {
      flex: 1 1 auto;
      min-height: 0;
      padding: 18px 20px 86px;
      overflow: auto;
    }

    .borrow-form-alert {
      margin-bottom: 18px;
    }

    .borrow-form-section {
      max-width: 1040px;
    }

    .borrow-org-trigger {
      justify-content: space-between;

      try {

      } catch (error) {
        return false;
      }
    };

      try {

      } catch (error) {

      }

    const unlockAccessGate = () => {
      document.body.classList.remove("access-gate-locked");
      document.getElementById("app")?.removeAttribute("aria-hidden");
      document.getElementById("accessGate")?.remove();
    };

    const initAccessGate = () => {
      const gate = document.getElementById("accessGate");
      const app = document.getElementById("app");
      const form = gate?.querySelector("[data-access-gate-form]");
      const input = gate?.querySelector("[data-access-gate-input]");
      const error = gate?.querySelector("[data-access-gate-error]");

      if (!gate || !form || !input) {
        document.body.classList.remove("access-gate-locked");
        return;
      }

      if (isAccessGateVerified()) {
        unlockAccessGate();
        return;
      }

      app?.setAttribute("aria-hidden", "true");
      input.focus();

      input.addEventListener("input", () => {
        error?.classList.remove("show");
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (input.value.trim() === DEMO_ACCESS_CODE) {
          setAccessGateVerified();
          unlockAccessGate();
          return;
        }
        error?.classList.add("show");
        input.select();
      });
    };

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));

    const stripHtml = (value) => String(value ?? "").replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();

    const tableSlug = (value, fallback) => {
      const slug = stripHtml(value).replace(/[^\w\u4e00-\u9fa5-]+/g, "-").replace(/^-+|-+$/g, "");
      return slug || fallback;
    };

    const normalizeEcmColumns = (columns) => columns.map((col, index) => {
      const label = col.label || stripHtml(col.title) || `字段${index + 1}`;
      return {
        ...col,
        key: col.key || col.dataIndex || `${tableSlug(label, "col")}-${index}`,
        label,
        originalIndex: index
      };
    });

      if (explicitId) return explicitId;
      const route = typeof routeFromHash === "function" ? routeFromHash() : { module: "page", page: "table", subPage: "" };

      return [route.module, route.page, route.subPage, suffix].filter(Boolean).join(":");

      density: "loose",
      zebra: false,
      verticalLines: true,
      visibleColumnKeys: columns.map((col) => col.key),
      fixedColumnKeys: columns.slice(0, Math.min(stickyLeftColumns, 3)).map((col) => col.key)

    const normalizeTableSettings = (settings, columns, stickyLeftColumns = 2) => {
      const defaults = defaultTableSettings(columns, stickyLeftColumns);
      const allKeys = columns.map((col) => col.key);
      const visibleColumnKeys = Array.isArray(settings?.visibleColumnKeys)
        ? settings.visibleColumnKeys.filter((key) => allKeys.includes(key))
        : defaults.visibleColumnKeys;
      const safeVisibleKeys = visibleColumnKeys.length ? visibleColumnKeys : defaults.visibleColumnKeys.slice(0, 1);
      const fixedColumnKeys = Array.isArray(settings?.fixedColumnKeys)
        ? settings.fixedColumnKeys.filter((key) => safeVisibleKeys.includes(key)).slice(0, 3)
        : defaults.fixedColumnKeys;

      return {
        ...defaults,
        ...settings,
        density: tableDensityOptions.some((item) => item.key === settings?.density) ? settings.density : defaults.density,
        zebra: Boolean(settings?.zebra ?? defaults.zebra),
        verticalLines: Boolean(settings?.verticalLines ?? defaults.verticalLines),
        visibleColumnKeys: columns.filter((col) => safeVisibleKeys.includes(col.key)).map((col) => col.key),
        fixedColumnKeys: columns.filter((col) => fixedColumnKeys.includes(col.key)).map((col) => col.key)
      };
    };

    const getTableSettings = (tableId, columns, stickyLeftColumns = 2) => {
      const settings = normalizeTableSettings(tableSettingsStore[tableId], columns, stickyLeftColumns);

      if (config.variant && buttonVariantClass[config.variant]) classes.add(buttonVariantClass[config.variant]);

        ".ai-center-page [data-tooltip]",
        ".ai-center-page [data-tip]",
        ".ai-center-page button[aria-label]",
        ".ai-center-page [role=\"separator\"][aria-label]",
        ".ai-quick-drawer [data-ai-tooltip]",
        ".ai-quick-drawer [data-tooltip]",
        ".ai-quick-drawer [data-tip]",

      ].join(", ")) || null;
      return target?.matches("[data-ai-no-tooltip]") ? null : target;

      || target?.dataset.tooltip
      || target?.dataset.tip
      || target?.getAttribute("aria-label")
      || "";

    const ensureAiTooltip = () => {
      let tooltip = document.getElementById("aiGlobalTooltip");
      if (!tooltip) {
        tooltip = document.createElement("div");
        tooltip.id = "aiGlobalTooltip";
        tooltip.className = "ai-global-tooltip";
        tooltip.setAttribute("role", "tooltip");
        tooltip.setAttribute("aria-hidden", "true");
        document.body.appendChild(tooltip);
      }
      return tooltip;
    };

    const hideAiTooltip = () => {
      aiTooltipTarget = null;
      const tooltip = document.getElementById("aiGlobalTooltip");
      if (!tooltip) return;
      tooltip.classList.remove("visible");
      tooltip.setAttribute("aria-hidden", "true");
    };

    const showAiTooltip = (target) => {
      const text = getAiTooltipText(target).trim();
      if (!text) {
        hideAiTooltip();
        return;
      }
      const tooltip = ensureAiTooltip();
      aiTooltipTarget = target;
      tooltip.textContent = text;
      tooltip.classList.remove("visible");
      tooltip.setAttribute("aria-hidden", "false");
      const targetRect = target.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      let top = targetRect.top - tooltipRect.height - 8;
      if (top < 8) top = targetRect.bottom + 8;
      let left = targetRect.left + ((targetRect.width - tooltipRect.width) / 2);
      left = Math.max(8, Math.min(left, window.innerWidth - tooltipRect.width - 8));
      top = Math.max(8, Math.min(top, window.innerHeight - tooltipRect.height - 8));
      tooltip.style.left = `${Math.round(left)}px`;
      tooltip.style.top = `${Math.round(top)}px`;
      requestAnimationFrame(() => {
        if (aiTooltipTarget === target) tooltip.classList.add("visible");
      });

    const getAiResizeStateKey = (handle) => {
      if (handle?.dataset.aiResizeHandle === "left") return "historyWidth";
      return handle?.dataset.aiResizePanel === "preview" ? "previewWidth" : "filesWidth";
    };

    const getAiResizeLimits = (handle) => {
      const page = handle?.closest("[data-ai-center-page]");
      if (!page) return { min: 0, max: 0 };
      if (handle.dataset.aiResizeHandle === "left") {
        const rightWidth = page.querySelector(".ai-preview, .ai-files-panel")?.getBoundingClientRect().width || 0;
        const availableMax = page.getBoundingClientRect().width - rightWidth - 185;
        return { min: 180, max: Math.min(420, Math.max(180, availableMax)) };
      }
      const canvasWidth = page.querySelector(".ai-canvas")?.getBoundingClientRect().width || page.getBoundingClientRect().width;
      const configuredMax = handle.dataset.aiResizePanel === "preview" ? 780 : 520;
      return { min: 180, max: Math.min(configuredMax, Math.max(180, canvasWidth - 185)) };
    };

    const applyAiPanelWidth = (handle, requestedWidth) => {
      const page = handle?.closest("[data-ai-center-page]");
      if (!page) return 0;
      const key = getAiResizeStateKey(handle);
      const { min, max } = getAiResizeLimits(handle);
      const nextWidth = Math.round(Math.min(max, Math.max(min, requestedWidth)));
      aiRuntime[key] = nextWidth;
      page.style.setProperty(handle.dataset.aiResizeHandle === "left" ? "--ai-side-width" : "--ai-right-pane-width", `${nextWidth}px`);
      handle.setAttribute("aria-valuenow", String(nextWidth));
      handle.setAttribute("aria-valuemax", String(Math.round(max)));
      return nextWidth;
    };

    const applyAiComposerHeight = (handle, requestedHeight) => {
      const stage = handle?.closest(".ai-chat-stage");
      if (!stage) return aiRuntime.composerHeight;
      const nextHeight = Math.round(Math.min(210, Math.max(96, Number(requestedHeight) || AI_LAYOUT_DEFAULTS.composerHeight)));
      aiRuntime.composerHeight = nextHeight;
      stage.style.setProperty("--ai-composer-height", `${nextHeight}px`);
      handle.setAttribute("aria-valuenow", String(nextHeight));
      return nextHeight;
    };

    const setAiKeyboardSelection = (root, selector, stateKey, direction) => {
      const options = Array.from(root?.querySelectorAll(selector) || []);
      if (!options.length) return -1;
      const focusedIndex = options.indexOf(document.activeElement);
      const currentIndex = aiRuntime[stateKey] >= 0 ? aiRuntime[stateKey] : focusedIndex;
      const nextIndex = currentIndex < 0
        ? (direction > 0 ? 0 : options.length - 1)
        : (currentIndex + direction + options.length) % options.length;
      aiRuntime[stateKey] = nextIndex;
      options.forEach((option, index) => {
        option.classList.toggle("keyboard-active", index === nextIndex);
        option.setAttribute("aria-selected", String(index === nextIndex));
      });
      return nextIndex;
    };

    const activateAiKeyboardSelection = (root, selector, stateKey) => {
      const options = Array.from(root?.querySelectorAll(selector) || []);
      const activeOption = options[aiRuntime[stateKey]];
      if (!activeOption) return false;
      activeOption.click();
      return true;

      const currentIndex = historyList.findIndex((item) => item.id === historyId);
      if (currentIndex < 0) return false;
      const [item] = historyList.splice(currentIndex, 1);
      item.pinned = pinned;
      const firstUnpinnedIndex = historyList.findIndex((historyItem) => !historyItem.pinned);
      const insertIndex = firstUnpinnedIndex < 0 ? historyList.length : firstUnpinnedIndex;

          const triggerRect = trigger.getBoundingClientRect();
          const menuTop = Math.max(8, Math.min(triggerRect.bottom + 4, window.innerHeight - menu.offsetHeight - 8));
          const menuLeft = Math.max(8, triggerRect.right - menu.offsetWidth);
          menu.style.position = "fixed";
          menu.style.top = `${menuTop}px`;
          menu.style.right = "auto";
          menu.style.left = `${menuLeft}px`;

        .map((option) => option.dataset.customKeyOption);

    const renderTableSettingsDrawer = () => {

        drawer.innerHTML = "";
        drawer.setAttribute("aria-hidden", "true");
        return;

      const settings = getTableSettings(activeTableSettingsId, meta.columns, meta.stickyLeftColumns);
      const visible = new Set(settings.visibleColumnKeys);
      const fixed = new Set(settings.fixedColumnKeys);
      const fixedColumns = meta.columns.filter((col) => visible.has(col.key) && fixed.has(col.key));
      const normalColumns = meta.columns.filter((col) => !fixed.has(col.key));

      drawer.innerHTML = `

      const meta = tableRegistry[tableId];

      const current = getTableSettings(tableId, meta.columns, meta.stickyLeftColumns);
      const next = typeof updater === "function" ? updater(current, meta) : { ...current, ...updater };
      tableSettingsStore[tableId] = normalizeTableSettings(next, meta.columns, meta.stickyLeftColumns);
      saveTableSettings();

      renderTableSettingsDrawer();

    const syncActionColumnShadows = () => {
      document.querySelectorAll(".table-wrap, .ecm-table-wrap, .config-table-wrap").forEach((wrap) => {
        const table = wrap.querySelector("table");
        if (!table) return;

        if (table.querySelector(".action-sticky")) {
          wrap.style.setProperty("--action-shadow-height", `${table.offsetHeight}px`);
        }

        if (table.querySelector(".config-action-head")) {
          wrap.style.setProperty("--config-action-shadow-height", `${table.offsetHeight}px`);
        }

        const hasHorizontalOverflow = wrap.scrollWidth > wrap.clientWidth + 2;
        wrap.classList.toggle("has-horizontal-overflow", hasHorizontalOverflow);

        const headerCells = Array.from(table.querySelectorAll("thead th"));
        const stickyIndexes = headerCells
          .map((cell, index) => cell.dataset.stickyLeft === "true" ? index : -1)
          .filter((index) => index >= 0);
        if (!stickyIndexes.length) return;

        let left = 0;
        stickyIndexes.forEach((index, order) => {
          const headerCell = headerCells[index];
          const cells = [headerCell, ...table.querySelectorAll(`tbody tr > *:nth-child(${index + 1})`)];
          cells.forEach((cell) => {
            cell.style.setProperty("--sticky-left", `${left}px`);
            cell.classList.toggle("left-shadow-anchor", hasHorizontalOverflow && order === stickyIndexes.length - 1);
          });
          left += headerCell.getBoundingClientRect().width;
        });
        wrap.style.setProperty("--left-shadow-height", `${table.offsetHeight}px`);
      });
    };

    window.addEventListener("resize", syncActionColumnShadows);

    document.addEventListener("mouseover", (event) => {
      const target = getAiTooltipTarget(event.target);
      if (!target || target === aiTooltipTarget) return;
      showAiTooltip(target);
    });

    document.addEventListener("mouseout", (event) => {
      if (!aiTooltipTarget || aiTooltipTarget.contains(event.relatedTarget)) return;
      hideAiTooltip();
    });

    document.addEventListener("focusin", (event) => {
      const target = getAiTooltipTarget(event.target);
      if (target) showAiTooltip(target);
    });

    document.addEventListener("focusout", (event) => {
      if (!aiTooltipTarget || aiTooltipTarget.contains(event.relatedTarget)) return;
      hideAiTooltip();
    });

    document.addEventListener("scroll", hideAiTooltip, true);
    window.addEventListener("resize", hideAiTooltip);

    document.addEventListener("pointerdown", (event) => {
      const composerHandle = event.target.closest?.("[data-ai-composer-resize]");
      if (composerHandle && event.button === 0) {
        event.preventDefault();
        const composer = composerHandle.closest(".ai-chat-composer");
        if (!composer) return;
        const startY = event.clientY;
        const startHeight = applyAiComposerHeight(composerHandle, composer.getBoundingClientRect().height);
        composerHandle.classList.add("is-resizing");
        document.body.classList.add("ai-row-resizing");
        composerHandle.setPointerCapture?.(event.pointerId);

        const moveComposer = (moveEvent) => {
          if (moveEvent.pointerId !== event.pointerId) return;
          applyAiComposerHeight(composerHandle, startHeight + (startY - moveEvent.clientY));
        };
        const finishComposer = (finishEvent) => {
          if (finishEvent.pointerId !== event.pointerId) return;
          composerHandle.classList.remove("is-resizing");
          document.body.classList.remove("ai-row-resizing");
          composerHandle.releasePointerCapture?.(event.pointerId);
          document.removeEventListener("pointermove", moveComposer);
          document.removeEventListener("pointerup", finishComposer);
          document.removeEventListener("pointercancel", finishComposer);
          persistAiLayoutPreferences();
        };

        document.addEventListener("pointermove", moveComposer);
        document.addEventListener("pointerup", finishComposer);
        document.addEventListener("pointercancel", finishComposer);
        return;
      }

      const handle = event.target.closest?.("[data-ai-resize-handle]");
      if (!handle || event.button !== 0) return;
      event.preventDefault();
      const page = handle.closest("[data-ai-center-page]");
      const panel = handle.dataset.aiResizeHandle === "left"
        ? page?.querySelector(".ai-history")
        : page?.querySelector(".ai-preview, .ai-files-panel");
      if (!page || !panel) return;

      const startX = event.clientX;
      const renderedStartWidth = panel.getBoundingClientRect().width;
      const startWidth = applyAiPanelWidth(handle, renderedStartWidth);
      const direction = handle.dataset.aiResizeHandle === "left" ? 1 : -1;
      handle.classList.add("is-resizing");
      document.body.classList.add("ai-column-resizing");
      handle.setPointerCapture?.(event.pointerId);

      const move = (moveEvent) => {
        if (moveEvent.pointerId !== event.pointerId) return;
        applyAiPanelWidth(handle, startWidth + ((moveEvent.clientX - startX) * direction));
      };
      const finish = (finishEvent) => {
        if (finishEvent.pointerId !== event.pointerId) return;
        handle.classList.remove("is-resizing");
        document.body.classList.remove("ai-column-resizing");
        handle.releasePointerCapture?.(event.pointerId);
        document.removeEventListener("pointermove", move);
        document.removeEventListener("pointerup", finish);
        document.removeEventListener("pointercancel", finish);
        persistAiLayoutPreferences();
      };

      document.addEventListener("pointermove", move);
      document.addEventListener("pointerup", finish);
      document.addEventListener("pointercancel", finish);
    });

      const aiSearchTrigger = event.target.closest("[data-ai-search-trigger]");

        aiRuntime.searchTab = "history";

        aiRuntime.searchActiveIndex = -1;
        aiRuntime.fileRowMenuId = null;
        aiRuntime.fileRowMenuActiveIndex = -1;
        refreshAiUi();
        return;
      }

      const aiSearchTab = event.target.closest("[data-ai-search-tab]");
      if (aiSearchTab) {
        event.preventDefault();
        aiRuntime.searchTab = aiSearchTab.dataset.aiSearchTab || "history";
        aiRuntime.searchActiveIndex = -1;
        aiRuntime.fileRowMenuId = null;
        aiRuntime.fileRowMenuActiveIndex = -1;
        refreshAiUi();
        return;
      }

      const aiSearchClear = event.target.closest("[data-ai-search-clear]");
      if (aiSearchClear) {
        event.preventDefault();
        const panel = aiSearchClear.closest("[data-ai-search-panel]");
        const input = panel?.querySelector("[data-ai-search-input]");

        if (results) results.innerHTML = "";

      const aiSearchHistory = event.target.closest("[data-ai-search-history]");
      if (aiSearchHistory) {
        event.preventDefault();
        aiRuntime.activeHistoryId = aiSearchHistory.dataset.aiSearchHistory || aiRuntime.activeHistoryId;
        aiRuntime.searchOpen = false;
        aiRuntime.searchActiveIndex = -1;
        aiRuntime.view = "result";
        aiRuntime.taskStep = 5;
        aiRuntime.taskDetailsExpanded = false;
        aiRuntime.preview = false;
        aiRuntime.filePanel = false;
        refreshAiUi();
        return;
      }

      const aiSearchFile = event.target.closest("[data-ai-search-file]");
      if (aiSearchFile) {
        event.preventDefault();
        aiRuntime.searchOpen = false;
        aiRuntime.searchActiveIndex = -1;
        aiRuntime.preview = true;
        aiRuntime.filePanel = false;
        aiRuntime.fileRowMenuId = null;
        aiRuntime.fileRowMenuActiveIndex = -1;

        refreshAiUi();
        return;
      }

      if (event.target.matches("[data-ai-search-backdrop]")) {
        event.preventDefault();
        aiRuntime.searchOpen = false;
        aiRuntime.searchActiveIndex = -1;
        aiRuntime.fileRowMenuId = null;
        aiRuntime.fileRowMenuActiveIndex = -1;
        refreshAiUi();
        requestAnimationFrame(() => document.querySelector("[data-ai-search-trigger]")?.focus());
        return;

      const aiMentionOption = event.target.closest("[data-ai-mention-option]");

        aiRuntime.conversationMoveOpen = true;
        aiRuntime.conversationMoveActiveIndex = -1;
        refreshAiUi();
        requestAnimationFrame(() => document.querySelector('[data-ai-conversation-action="move"]')?.focus());
        return;
      }
      if (aiRuntime.conversationMenuOpen && aiConversationKeyboardTarget && (event.key === "ArrowDown" || event.key === "ArrowUp")) {
        event.preventDefault();
        setAiKeyboardSelection(document.querySelector(".ai-conversation-context-menu"), "[data-ai-conversation-action]", "conversationMenuActiveIndex", event.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if (aiRuntime.conversationMenuOpen && aiConversationKeyboardTarget && event.key === "Enter" && aiRuntime.conversationMenuActiveIndex >= 0) {
        event.preventDefault();
        activateAiKeyboardSelection(document.querySelector(".ai-conversation-context-menu"), "[data-ai-conversation-action]", "conversationMenuActiveIndex");
        return;
      }
      if (aiRuntime.conversationMenuOpen && aiConversationKeyboardTarget && event.key === "Escape") {
        event.preventDefault();
        aiRuntime.conversationMenuOpen = false;
        aiRuntime.conversationMenuActiveIndex = -1;
        aiRuntime.conversationMoveOpen = false;
        aiRuntime.conversationMoveActiveIndex = -1;
        refreshAiUi();
        requestAnimationFrame(() => document.querySelector("[data-ai-conversation-more]")?.focus());
        return;
      }

      const aiHistoryMoveKeyboardTarget = event.target.closest?.('[data-ai-history-action="move"], [data-ai-history-group-option]');
      if (aiRuntime.historyMenuId !== null && aiRuntime.historyMoveOpen && aiHistoryMoveKeyboardTarget && (event.key === "ArrowDown" || event.key === "ArrowUp")) {
        event.preventDefault();
        setAiKeyboardSelection(document.querySelector(".ai-history-move-submenu"), "[data-ai-history-group-option]", "historyMoveActiveIndex", event.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiRuntime.historyMoveOpen && aiHistoryMoveKeyboardTarget && event.key === "Enter" && aiRuntime.historyMoveActiveIndex >= 0) {
        event.preventDefault();
        activateAiKeyboardSelection(document.querySelector(".ai-history-move-submenu"), "[data-ai-history-group-option]", "historyMoveActiveIndex");
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiRuntime.historyMoveOpen && aiHistoryMoveKeyboardTarget && (event.key === "Escape" || event.key === "ArrowLeft")) {
        event.preventDefault();
        aiRuntime.historyMoveOpen = false;
        aiRuntime.historyMoveActiveIndex = -1;
        refreshAiUi();
        positionAiHistoryContextMenu(aiRuntime.historyMenuId, '[data-ai-history-action="move"]');
        return;
      }

      const aiHistoryKeyboardTarget = event.target.closest?.("[data-ai-history-more], [data-ai-history-action]");
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && event.key === "ArrowRight" && (aiRuntime.historyMenuActiveIndex === 2 || aiHistoryKeyboardTarget.matches('[data-ai-history-action="move"]'))) {
        event.preventDefault();
        aiRuntime.historyMoveOpen = true;
        aiRuntime.historyMoveActiveIndex = -1;
        refreshAiUi();
        positionAiHistoryContextMenu(aiRuntime.historyMenuId, '[data-ai-history-action="move"]');
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && (event.key === "ArrowDown" || event.key === "ArrowUp")) {
        event.preventDefault();
        setAiKeyboardSelection(document.querySelector(".ai-history-context-menu"), "[data-ai-history-action]", "historyMenuActiveIndex", event.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && event.key === "Enter" && aiRuntime.historyMenuActiveIndex >= 0) {
        event.preventDefault();
        activateAiKeyboardSelection(document.querySelector(".ai-history-context-menu"), "[data-ai-history-action]", "historyMenuActiveIndex");
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && event.key === "Escape") {
        event.preventDefault();
        const historyId = aiRuntime.historyMenuId;
        aiRuntime.historyMenuId = null;
        aiRuntime.historyMenuActiveIndex = -1;
        aiRuntime.historyMoveOpen = false;
        aiRuntime.historyMoveActiveIndex = -1;
        refreshAiUi();
        requestAnimationFrame(() => document.querySelector(`[data-ai-history-more="${historyId}"]`)?.focus());
        return;
      }

      const notificationTrigger = event.target.closest?.("[data-notification-trigger]");
      if (notificationTrigger && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        closeUserMenu();
        toggleNotificationMenu();
        return;
      }

      const userMenuTrigger = event.target.closest?.("[data-user-menu-trigger]");
      if (userMenuTrigger && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        closeNotificationMenu();
        toggleUserMenu();
        return;
      }
      if (event.key === "Escape") {
        closeNotificationMenu();
        closeUserMenu();
      }
    });

    document.addEventListener("dragstart", (event) => {
      const component = event.target.closest("[data-form-component]");
      if (!component) return;
      event.dataTransfer?.setData("text/plain", JSON.stringify({
        type: component.dataset.formComponent,
        label: component.dataset.formComponentLabel
      }));
      event.dataTransfer?.setData("application/maycur-form-component", component.dataset.formComponentLabel || "");
    });

    document.addEventListener("dragover", (event) => {
      const dropTarget = event.target.closest("[data-form-drop-target], [data-form-drop-zone]");
      if (!dropTarget) return;
      event.preventDefault();
      dropTarget.classList.add(dropTarget.hasAttribute("data-form-drop-target") ? "is-drag-over" : "drag-over");
    });

    document.addEventListener("dragleave", (event) => {
      const dropTarget = event.target.closest("[data-form-drop-target], [data-form-drop-zone]");
      if (!dropTarget || dropTarget.contains(event.relatedTarget)) return;
      dropTarget.classList.remove("is-drag-over", "drag-over");
    });

    document.addEventListener("drop", (event) => {
      const dropTarget = event.target.closest("[data-form-drop-target], [data-form-drop-zone]");
      if (!dropTarget) return;
      event.preventDefault();
      document.querySelectorAll(".is-drag-over, .drag-over").forEach((node) => node.classList.remove("is-drag-over", "drag-over"));
      try {
        const data = JSON.parse(event.dataTransfer?.getData("text/plain") || "{}");
        if (data.label) addCustomBuilderField(dropTarget.closest("[data-custom-form-builder]"), data.label, data.type || "text");
      } catch (error) {
        // Drag data may be unavailable in some preview browsers; click-to-add remains supported.
      }
    });

    document.addEventListener("input", (event) => {
      const aiSearchInput = event.target.closest("[data-ai-search-input]");
      if (aiSearchInput) {
        aiRuntime.searchQuery = aiSearchInput.value;
        aiRuntime.searchActiveIndex = -1;
        aiRuntime.fileRowMenuId = null;
        aiRuntime.fileRowMenuActiveIndex = -1;
        const results = aiSearchInput.closest("[data-ai-search-panel]")?.querySelector(".ai-search-results");
        if (results) results.innerHTML = renderAiSearchResults();
        return;
      }
      const aiPromptInput = event.target.closest(".ai-prompt-input");
      if (aiPromptInput) {
        const prompt = aiPromptInput.closest(".ai-prompt");
        const hasValue = Boolean(aiPromptInput.value);
        const mentionOpen = aiPromptInput.value.endsWith("@");
        aiRuntime.draft = aiPromptInput.value;
        aiRuntime.mentionOpen = mentionOpen;
        aiRuntime.mentionActiveIndex = -1;
        aiRuntime.scenarioOpen = false;
        aiRuntime.scenarioActiveIndex = -1;
        aiRuntime.fileOpen = false;
        aiRuntime.fileActiveIndex = -1;
        prompt?.classList.toggle("has-value", hasValue);
        const sendButton = prompt?.querySelector(".ai-send");
        const canSend = aiRuntime.view === "processing" || Boolean(aiPromptInput.value.trim());
        sendButton?.classList.toggle("ready", canSend);
        if (sendButton) sendButton.disabled = !canSend;
        prompt?.querySelectorAll(".ai-select-menu").forEach((menu) => { menu.hidden = true; });
        const mentionMenu = prompt?.querySelector(".ai-mention-menu");
        if (mentionMenu) mentionMenu.hidden = !mentionOpen;
        prompt?.querySelectorAll("[data-ai-mention-option]").forEach((option) => {
          option.classList.remove("keyboard-active");
          option.setAttribute("aria-selected", "false");
        });
        return;
      }
      const globalFilterSearch = event.target.closest("[data-global-filter-search]");
      if (globalFilterSearch) {
        const keyword = globalFilterSearch.value.trim().toLowerCase();
        const panel = globalFilterSearch.closest(".global-filter-panel");
        panel?.querySelectorAll(".global-filter-field-item").forEach((item) => {
          const label = item.textContent.trim().toLowerCase();
          item.style.display = !keyword || label.includes(keyword) ? "" : "none";
        });
        return;
      }

      const businessModelSearch = event.target.closest("[data-business-model-search]");
      if (businessModelSearch) {
        applyBusinessModelSearch(businessModelSearch);
        return;
      }

      const manualAccountInput = event.target.closest("[data-ocr-account-input]");
      if (!manualAccountInput) return;
      try {
        localStorage.setItem("maycur-archive-local-demo.ocr-manual-account", manualAccountInput.value);
      } catch (error) {
        // Local file previews can block storage; keeping the typed value in the current field is enough for the demo.
      }
    });

    document.addEventListener("submit", (event) => {
      if (!event.target.matches("[data-ai-prompt-form]")) return;
      event.preventDefault();
      if (aiRuntime.view === "processing") {
        cancelAiTask();
        return;
      }
      const input = event.target.querySelector(".ai-prompt-input");
      if (!input?.value.trim()) {
        input?.focus();
        return;
      }
      startAiTask();
    });

    window.addEventListener("hashchange", () => {
      hideAiTooltip();
      document.body.classList.remove("table-settings-open");
      activeTableSettingsId = "";
      renderPage();
      renderTableSettingsDrawer();
    });
    initAccessGate();
    if (!location.hash) {
      location.hash = "#/home";
    } else {
      renderPage();
    }
  </script>
</body>
</html>
