    const getAiQuickDrawerWidthLimits = () => {
      const max = Math.max(1, Math.floor(window.innerWidth * .45));
      return { min: Math.min(AI_LAYOUT_DEFAULTS.quickDrawerWidth, max), max };
    };

    const applyAiQuickDrawerWidth = (requestedWidth, handle = document.querySelector("[data-ai-quick-resize]")) => {
      const drawer = document.getElementById("aiQuickDrawer");
      const { min, max } = getAiQuickDrawerWidthLimits();
      const nextWidth = Math.round(Math.min(max, Math.max(min, Number(requestedWidth) || AI_LAYOUT_DEFAULTS.quickDrawerWidth)));
      aiRuntime.quickDrawerWidth = nextWidth;
      if (drawer && aiRuntime.quickMode === "drawer") drawer.style.width = `${nextWidth}px`;
      handle?.setAttribute("aria-valuemin", String(min));
      handle?.setAttribute("aria-valuemax", String(max));
      handle?.setAttribute("aria-valuenow", String(nextWidth));
      return nextWidth;
    };

    const positionAiQuickDrawer = (drawer) => {
      const floating = aiRuntime.quickMode === "floating";
      drawer.classList.toggle("floating", floating);
      if (!floating) {
        drawer.removeAttribute("style");
        applyAiQuickDrawerWidth(aiRuntime.quickDrawerWidth);
        return;
      }
      const width = Math.min(438, Math.max(280, window.innerWidth - 16));
      const height = Math.min(666, Math.max(420, window.innerHeight - 58));
      const maxLeft = Math.max(8, window.innerWidth - width - 8);
      const maxTop = Math.max(58, window.innerHeight - height - 8);
      aiRuntime.quickX = Math.max(8, Math.min(Number.isFinite(aiRuntime.quickX) ? aiRuntime.quickX : maxLeft, maxLeft));
      aiRuntime.quickY = Math.max(58, Math.min(Number.isFinite(aiRuntime.quickY) ? aiRuntime.quickY : 58, maxTop));
      drawer.style.left = `${Math.round(aiRuntime.quickX)}px`;
      drawer.style.top = `${Math.round(aiRuntime.quickY)}px`;
      drawer.style.right = "auto";
      drawer.style.bottom = "auto";
      drawer.style.width = `${Math.round(width)}px`;
      drawer.style.height = `${Math.round(height)}px`;
    };

    const renderAiQuickDrawer = () => {
      const drawer = document.getElementById("aiQuickDrawer");
      if (!drawer) return;
      drawer.classList.toggle("open", aiRuntime.quickOpen);

    const getAiResizeLimits = (handle) => {

      if (handle.dataset.aiResizeHandle === "left") {
        const rightWidth = page.querySelector(".ai-preview, .ai-files-panel")?.getBoundingClientRect().width || 0;
        const availableMax = page.getBoundingClientRect().width - rightWidth - 185;
        return { min: 180, max: Math.min(420, Math.max(180, availableMax)) };
      }
      const canvasWidth = page.querySelector(".ai-canvas")?.getBoundingClientRect().width || page.getBoundingClientRect().width;
      const configuredMax = handle.dataset.aiResizePanel === "preview" ? 780 : 520;
      return { min: 180, max: Math.min(configuredMax, Math.max(180, canvasWidth - 185)) };
    };

      const page = handle?.closest("[data-ai-center-page]");
      if (!page) return 0;
      const key = getAiResizeStateKey(handle);
      const { min, max } = getAiResizeLimits(handle);
      const nextWidth = Math.round(Math.min(max, Math.max(min, requestedWidth)));
      aiRuntime[key] = nextWidth;
      page.style.setProperty(handle.dataset.aiResizeHandle === "left" ? "--ai-side-width" : "--ai-right-pane-width", `${nextWidth}px`);
      handle.setAttribute("aria-valuenow", String(nextWidth));

      const options = Array.from(root?.querySelectorAll(selector) || []);
      if (!options.length) return -1;
      const focusedIndex = options.indexOf(document.activeElement);
      const currentIndex = aiRuntime[stateKey] >= 0 ? aiRuntime[stateKey] : focusedIndex;
      const nextIndex = currentIndex < 0
        ? (direction > 0 ? 0 : options.length - 1)
        : (currentIndex + direction + options.length) % options.length;
      aiRuntime[stateKey] = nextIndex;
      options.forEach((option, index) => {
        option.classList.toggle("keyboard-active", index === nextIndex);
        if (option.getAttribute("role") === "option") option.setAttribute("aria-selected", String(index === nextIndex));
      });
      options[nextIndex]?.focus({ preventScroll: true });
      return nextIndex;
    };

      if (sourceIndex < 0) {

      const [historyItem] = sourceList.splice(sourceIndex, 1);

      aiRuntime.composerAttachmentIds = [];
      clearAiToast();
      const advance = () => {
        if (aiRuntime.view !== "processing") return;
        aiRuntime.taskStep += 1;
        if (aiRuntime.taskStep >= AI_FALLBACK_TASK_STEPS.length) {
          const completedItem = getActiveAiHistoryItem();
          const completedMessage = getAiLatestConversationMessage(completedItem);
          if (completedItem && completedMessage) {
            completedMessage.answeredAt = formatAiAnswerTime();
            completedMessage.cancelled = false;
            persistAiHistoryThread(completedItem);
            if (completedItem.isLocalFallback) persistAiCustomHistoryItems();
          }
          aiRuntime.view = "result";
          setAiToast("回答已生成");
        }
        refreshAiUi({ scrollChatToBottom: true });
        if (aiRuntime.view === "processing") aiTaskTimer = setTimeout(advance, 620);
      };
      refreshAiUi({ scrollChatToBottom: true });
      aiTaskTimer = setTimeout(advance, 620);
    };

    const cancelAiTask = () => {
      if (aiRuntime.view !== "processing") return;
      clearTimeout(aiTaskTimer);
      aiTaskTimer = null;
      aiRuntime.view = "cancelled";
      aiRuntime.taskDetailsExpanded = false;
      clearAiToast();
      const activeItem = getActiveAiHistoryItem();
      const activeMessage = getAiLatestConversationMessage(activeItem);
      if (activeItem && activeMessage) {
        activeMessage.cancelled = true;
        persistAiHistoryThread(activeItem);

      const subtablePanel = page?.querySelector("[data-property-subtable]");
      if (normalPanel) normalPanel.hidden = isSubtable;
      if (subtablePanel) subtablePanel.hidden = !isSubtable;
      const propertyName = page?.querySelector(isSubtable ? "[data-custom-subtable-name]" : "[data-custom-prop-name]");
      if (propertyName) propertyName.textContent = field.dataset.fieldLabel || "字段名称";

    const updateCustomKeySelector = (selector) => {
      if (!selector) return;
      const options = Array.from(selector.querySelectorAll("[data-custom-key-option]"));
      const selected = options
        .filter((option) => option.classList.contains("selected"))
        .map((option) => option.dataset.customKeyOption);
      const display = selector.querySelector("[data-custom-key-toggle]");
      if (display) {
        display.innerHTML = `
          ${selected.slice(0, 4).map((item) => `<span class="custom-key-tag">${escapeHtml(item)} ×</span>`).join("")}
          <span class="custom-key-count">共 <strong>${selected.length}</strong> 项</span>
          ${dropdownIcon()}
        `;
      }
      const limitReached = selected.length >= 10;
      options.forEach((option) => {
        const isSelected = option.classList.contains("selected");
        option.classList.toggle("disabled", limitReached && !isSelected);
        option.querySelector(".custom-key-check").textContent = isSelected ? "✓" : "";

    const syncActionColumnShadows = () => {
      document.querySelectorAll(".table-wrap, .ecm-table-wrap, .config-table-wrap").forEach((wrap) => {
        const table = wrap.querySelector("table");
        if (!table) return;

        if (table.querySelector(".action-sticky")) {
          wrap.style.setProperty("--action-shadow-height", `${table.offsetHeight}px`);
        }

        if (table.querySelector(".config-action-head")) {
          wrap.style.setProperty("--config-action-shadow-height", `${table.offsetHeight}px`);
        }

        const hasHorizontalOverflow = wrap.scrollWidth > wrap.clientWidth + 2;
        wrap.classList.toggle("has-horizontal-overflow", hasHorizontalOverflow);

        const headerCells = Array.from(table.querySelectorAll("thead th"));
        const stickyIndexes = headerCells
          .map((cell, index) => cell.dataset.stickyLeft === "true" ? index : -1)
          .filter((index) => index >= 0);
        if (!stickyIndexes.length) return;

        let left = 0;
        stickyIndexes.forEach((index, order) => {
          const headerCell = headerCells[index];
          const cells = [headerCell, ...table.querySelectorAll(`tbody tr > *:nth-child(${index + 1})`)];
          cells.forEach((cell) => {
            cell.style.setProperty("--sticky-left", `${left}px`);
            cell.classList.toggle("left-shadow-anchor", hasHorizontalOverflow && order === stickyIndexes.length - 1);
          });
          left += headerCell.getBoundingClientRect().width;
        });
        wrap.style.setProperty("--left-shadow-height", `${table.offsetHeight}px`);
      });
    };

      empty.classList.toggle("is-visible", !hasVisibleGroup);

          row.classList.toggle("is-hidden", !matched);
          if (matched) visibleCount += 1;

        group.classList.toggle("is-search-empty", Boolean(keyword) && visibleCount === 0);

      closeUserMenu();
      closeNotificationMenu();
      const module = moduleMap[route.module];
      const menu = findMenuItem(route.module, route.page);
      const sidebarPage = route.module === "business" && route.page === "ocr-management"
        ? route.subPage === "document" ? "general-business" : "bank-receipt"
        : route.page;
      const isVoucherDetailRoute = route.module === "business"
        && route.page === "voucher"

      const businessModelSubMode = route.module === "settings" && route.page === "business-model"

      const businessModelSubParts = route.module === "settings" && route.page === "business-model"

        : null;

        : [];
      const isCustomFormBuilderRoute = route.module === "settings"

        && route.page === "business-model"

        : isAccountBookConfigEditRoute

        : generalBusinessDocumentName

        : route.module === "business" && route.page === "ocr-management"

    window.addEventListener("resize", () => {

    document.addEventListener("mouseover", (event) => {
      const target = getAiTooltipTarget(event.target);
      if (!target || target === aiTooltipTarget) return;
      showAiTooltip(target);
    });

    document.addEventListener("mouseout", (event) => {
      if (!aiTooltipTarget || aiTooltipTarget.contains(event.relatedTarget)) return;
      hideAiTooltip();
    });

    document.addEventListener("focusin", (event) => {
      const target = getAiTooltipTarget(event.target);
      if (target) showAiTooltip(target);
    });

    document.addEventListener("focusout", (event) => {
      if (!aiTooltipTarget || aiTooltipTarget.contains(event.relatedTarget)) return;
      hideAiTooltip();
    });

    document.addEventListener("scroll", (event) => {
      hideAiTooltip();
      const promptInput = event.target.closest?.(".ai-prompt-input");
      if (!promptInput) return;
      const agentPrefix = promptInput.closest(".ai-prompt-entry")?.querySelector(".ai-selected-agent-prefix");
      if (agentPrefix) agentPrefix.style.transform = promptInput.scrollTop ? `translateY(${-promptInput.scrollTop}px)` : "";
    }, true);
    window.addEventListener("resize", hideAiTooltip);

    document.addEventListener("pointerdown", (event) => {
      const quickResizeHandle = event.target.closest?.("[data-ai-quick-resize]");
      if (quickResizeHandle && event.button === 0 && aiRuntime.quickMode === "drawer") {
        event.preventDefault();
        const drawer = quickResizeHandle.closest(".ai-quick-drawer");
        if (!drawer) return;
        const startX = event.clientX;
        const startWidth = applyAiQuickDrawerWidth(drawer.getBoundingClientRect().width, quickResizeHandle);
        quickResizeHandle.classList.add("is-resizing");
        document.body.classList.add("ai-quick-resizing");
        quickResizeHandle.setPointerCapture?.(event.pointerId);

        const moveQuickResize = (moveEvent) => {
          if (moveEvent.pointerId !== event.pointerId) return;
          applyAiQuickDrawerWidth(startWidth + (startX - moveEvent.clientX), quickResizeHandle);
        };
        const finishQuickResize = (finishEvent) => {
          if (finishEvent.pointerId !== event.pointerId) return;
          quickResizeHandle.classList.remove("is-resizing");
          document.body.classList.remove("ai-quick-resizing");
          quickResizeHandle.releasePointerCapture?.(event.pointerId);
          document.removeEventListener("pointermove", moveQuickResize);
          document.removeEventListener("pointerup", finishQuickResize);
          document.removeEventListener("pointercancel", finishQuickResize);
          persistAiLayoutPreferences();
        };

        document.addEventListener("pointermove", moveQuickResize);
        document.addEventListener("pointerup", finishQuickResize);
        document.addEventListener("pointercancel", finishQuickResize);
        return;
      }

      const quickDragHandle = event.target.closest?.("[data-ai-quick-drag]");
      if (quickDragHandle && event.button === 0) {
        event.preventDefault();
        let drawer = quickDragHandle.closest(".ai-quick-drawer");
        if (!drawer) return;
        const initialRect = drawer.querySelector(".ai-quick-shell")?.getBoundingClientRect() || drawer.getBoundingClientRect();
        if (aiRuntime.quickMode !== "floating") {
          aiRuntime.quickMode = "floating";
          aiRuntime.quickX = initialRect.left;
          aiRuntime.quickY = initialRect.top;
          renderAiQuickDrawer();
          drawer = document.getElementById("aiQuickDrawer");
        }
        const rect = drawer.getBoundingClientRect();
        const offsetX = event.clientX - rect.left;
        const offsetY = event.clientY - rect.top;
        document.body.classList.add("ai-quick-dragging");
        drawer.setPointerCapture?.(event.pointerId);

        const moveQuickDrawer = (moveEvent) => {
          if (moveEvent.pointerId !== event.pointerId) return;
          const currentRect = drawer.getBoundingClientRect();
          const maxLeft = Math.max(8, window.innerWidth - currentRect.width - 8);
          const maxTop = Math.max(58, window.innerHeight - currentRect.height - 8);

        return;
      }
      if (aiRuntime.conversationMenuOpen && aiConversationKeyboardTarget && (event.key === "ArrowDown" || event.key === "ArrowUp")) {
        event.preventDefault();
        setAiKeyboardSelection(document.querySelector(".ai-conversation-context-menu"), "[data-ai-conversation-action]", "conversationMenuActiveIndex", event.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if (aiRuntime.conversationMenuOpen && aiConversationKeyboardTarget && event.key === "Enter" && aiRuntime.conversationMenuActiveIndex >= 0) {
        event.preventDefault();
        activateAiKeyboardSelection(document.querySelector(".ai-conversation-context-menu"), "[data-ai-conversation-action]", "conversationMenuActiveIndex");
        return;
      }
      if (aiRuntime.conversationMenuOpen && aiConversationKeyboardTarget && event.key === "Escape") {
        event.preventDefault();
        aiRuntime.conversationMenuOpen = false;
        aiRuntime.conversationMenuActiveIndex = -1;
        aiRuntime.conversationMoveOpen = false;
        aiRuntime.conversationMoveActiveIndex = -1;
        refreshAiUi();
        requestAnimationFrame(() => document.querySelector("[data-ai-conversation-more]")?.focus());
        return;
      }

      const aiHistoryMoveKeyboardTarget = event.target.closest?.('[data-ai-history-action="move"], [data-ai-history-group-option]');
      if (aiRuntime.historyMenuId !== null && aiRuntime.historyMoveOpen && aiHistoryMoveKeyboardTarget && (event.key === "ArrowDown" || event.key === "ArrowUp")) {
        event.preventDefault();
        setAiKeyboardSelection(document.querySelector(".ai-history-move-submenu"), "[data-ai-history-group-option]", "historyMoveActiveIndex", event.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiRuntime.historyMoveOpen && aiHistoryMoveKeyboardTarget && event.key === "Enter" && aiRuntime.historyMoveActiveIndex >= 0) {
        event.preventDefault();
        activateAiKeyboardSelection(document.querySelector(".ai-history-move-submenu"), "[data-ai-history-group-option]", "historyMoveActiveIndex");
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiRuntime.historyMoveOpen && aiHistoryMoveKeyboardTarget && (event.key === "Escape" || event.key === "ArrowLeft")) {
        event.preventDefault();
        aiRuntime.historyMoveOpen = false;
        aiRuntime.historyMoveActiveIndex = -1;
        refreshAiUi();
        positionAiHistoryContextMenu(aiRuntime.historyMenuId, '[data-ai-history-action="move"]');
        return;
      }

      const aiHistoryKeyboardTarget = event.target.closest?.("[data-ai-history-more], [data-ai-history-action]");
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && event.key === "ArrowRight" && (aiRuntime.historyMenuActiveIndex === 2 || aiHistoryKeyboardTarget.matches('[data-ai-history-action="move"]'))) {
        event.preventDefault();
        aiRuntime.historyMoveOpen = true;
        aiRuntime.historyMoveActiveIndex = -1;
        refreshAiUi();
        positionAiHistoryContextMenu(aiRuntime.historyMenuId, '[data-ai-history-action="move"]');
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && (event.key === "ArrowDown" || event.key === "ArrowUp")) {
        event.preventDefault();
        setAiKeyboardSelection(document.querySelector(".ai-history-context-menu"), "[data-ai-history-action]", "historyMenuActiveIndex", event.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && event.key === "Enter" && aiRuntime.historyMenuActiveIndex >= 0) {
        event.preventDefault();
        activateAiKeyboardSelection(document.querySelector(".ai-history-context-menu"), "[data-ai-history-action]", "historyMenuActiveIndex");
        return;
      }
      if (aiRuntime.historyMenuId !== null && aiHistoryKeyboardTarget && event.key === "Escape") {
        event.preventDefault();
        const historyId = aiRuntime.historyMenuId;
        aiRuntime.historyMenuId = null;
        aiRuntime.historyMenuActiveIndex = -1;
        aiRuntime.historyMoveOpen = false;
        aiRuntime.historyMoveActiveIndex = -1;
        refreshAiUi();
        requestAnimationFrame(() => document.querySelector(`[data-ai-history-more="${historyId}"]`)?.focus());
        return;
      }

      const notificationTrigger = event.target.closest?.("[data-notification-trigger]");
      if (notificationTrigger && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        closeUserMenu();
        toggleNotificationMenu();
        return;
      }

      const userMenuTrigger = event.target.closest?.("[data-user-menu-trigger]");
      if (userMenuTrigger && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        closeNotificationMenu();
        toggleUserMenu();
        return;
      }
      if (event.key === "Escape") {
        closeNotificationMenu();
        closeUserMenu();
      }
    });

    window.addEventListener("beforeunload", () => {
      getAiAllFiles().forEach((file) => {
        const objectUrl = getAiFileState(file).objectUrl;
        if (objectUrl) URL.revokeObjectURL(objectUrl);
      });
    });

    document.addEventListener("dragstart", (event) => {
      const component = event.target.closest("[data-form-component]");
      if (!component) return;
      event.dataTransfer?.setData("text/plain", JSON.stringify({
        type: component.dataset.formComponent,
        label: component.dataset.formComponentLabel
      }));
      event.dataTransfer?.setData("application/maycur-form-component", component.dataset.formComponentLabel || "");
    });

    document.addEventListener("dragover", (event) => {
      const dropTarget = event.target.closest("[data-form-drop-target], [data-form-drop-zone]");
      if (!dropTarget) return;
      event.preventDefault();
      dropTarget.classList.add(dropTarget.hasAttribute("data-form-drop-target") ? "is-drag-over" : "drag-over");
    });

    document.addEventListener("dragleave", (event) => {
      const dropTarget = event.target.closest("[data-form-drop-target], [data-form-drop-zone]");
      if (!dropTarget || dropTarget.contains(event.relatedTarget)) return;
      dropTarget.classList.remove("is-drag-over", "drag-over");
    });

    document.addEventListener("drop", (event) => {
      const dropTarget = event.target.closest("[data-form-drop-target], [data-form-drop-zone]");
      if (!dropTarget) return;
      event.preventDefault();
      document.querySelectorAll(".is-drag-over, .drag-over").forEach((node) => node.classList.remove("is-drag-over", "drag-over"));
      try {
        const data = JSON.parse(event.dataTransfer?.getData("text/plain") || "{}");
        if (data.label) addCustomBuilderField(dropTarget.closest("[data-custom-form-builder]"), data.label, data.type || "text");
      } catch (error) {
        // Drag data may be unavailable in some preview browsers; click-to-add remains supported.
      }
    });

    document.addEventListener("input", (event) => {
      const aiRenameInput = event.target.closest("[data-ai-rename-input]");
      if (aiRenameInput) {
        aiRuntime.renameName = aiRenameInput.value;
        if (aiRuntime.renameError) {
          aiRuntime.renameError = "";
          aiRenameInput.setAttribute("aria-invalid", "false");
          const status = aiRenameInput.closest("[data-ai-rename-form]")?.querySelector(".ai-new-group-status");
          if (status) status.textContent = "";
        }
        return;
      }
      const aiNewGroupInput = event.target.closest("[data-ai-new-group-input]");
      if (aiNewGroupInput) {
        aiRuntime.newGroupName = aiNewGroupInput.value;
        if (aiRuntime.newGroupError) {
          aiRuntime.newGroupError = "";
          aiNewGroupInput.setAttribute("aria-invalid", "false");
          const status = aiNewGroupInput.closest("[data-ai-new-group-form]")?.querySelector(".ai-new-group-status");
          if (status) status.textContent = "";
        }
        return;
      }
      const aiSearchInput = event.target.closest("[data-ai-search-input]");
      if (aiSearchInput) {
        aiRuntime.searchQuery = aiSearchInput.value;
        aiRuntime.searchActiveIndex = -1;
        aiRuntime.fileRowMenuId = null;
        aiRuntime.fileRowMenuActiveIndex = -1;
        const results = aiSearchInput.closest("[data-ai-search-panel]")?.querySelector(".ai-search-results");
        if (results) results.innerHTML = renderAiSearchResults();
        return;
      }
      const aiPromptInput = event.target.closest(".ai-prompt-input");
      if (aiPromptInput) {
        const prompt = aiPromptInput.closest(".ai-prompt");
        const hasValue = Boolean(aiPromptInput.value);
        const mentionOpen = aiPromptInput.value.endsWith("@");
        aiRuntime.draft = aiPromptInput.value;
        aiRuntime.mentionOpen = mentionOpen;
        aiRuntime.mentionActiveIndex = -1;
        aiRuntime.scenarioOpen = false;
        aiRuntime.scenarioActiveIndex = -1;
        aiRuntime.fileOpen = false;
        aiRuntime.fileActiveIndex = -1;
        prompt?.classList.toggle("has-value", hasValue);
        const sendButton = prompt?.querySelector(".ai-send");
        const canSend = aiRuntime.view === "processing" || Boolean(aiPromptInput.value.trim());
        sendButton?.classList.toggle("ready", canSend);
        if (sendButton) sendButton.disabled = !canSend;
        prompt?.querySelectorAll(".ai-select-menu").forEach((menu) => { menu.hidden = true; });
        const mentionMenu = prompt?.querySelector(".ai-mention-menu");
        if (mentionMenu) mentionMenu.hidden = !mentionOpen;
        prompt?.querySelectorAll("[data-ai-mention-option]").forEach((option) => {
          option.classList.remove("keyboard-active");
          option.setAttribute("aria-checked", option.dataset.aiMentionOption === aiRuntime.selectedScenarioKey ? "true" : "false");
        });
        return;
      }
      const globalFilterSearch = event.target.closest("[data-global-filter-search]");
      if (globalFilterSearch) {
        const keyword = globalFilterSearch.value.trim().toLowerCase();
        const panel = globalFilterSearch.closest(".global-filter-panel");
        panel?.querySelectorAll(".global-filter-field-item").forEach((item) => {
          const label = item.textContent.trim().toLowerCase();
          item.style.display = !keyword || label.includes(keyword) ? "" : "none";
        });
        return;
      }

      const businessModelSearch = event.target.closest("[data-business-model-search]");
      if (businessModelSearch) {
        applyBusinessModelSearch(businessModelSearch);
        return;
      }

      const manualAccountInput = event.target.closest("[data-ocr-account-input]");
      if (!manualAccountInput) return;
      try {
        localStorage.setItem("maycur-archive-local-demo.ocr-manual-account", manualAccountInput.value);
      } catch (error) {
        // Local file previews can block storage; keeping the typed value in the current field is enough for the demo.
      }
    });

    document.addEventListener("submit", (event) => {
      if (event.target.matches("[data-ai-rename-form]")) {
        event.preventDefault();
        saveAiRename(event.target);
        return;
      }
      if (event.target.matches("[data-ai-new-group-form]")) {
        event.preventDefault();
        saveAiNewGroup(event.target);
        return;
      }
      if (!event.target.matches("[data-ai-prompt-form]")) return;
      event.preventDefault();
      if (aiRuntime.view === "processing") {
        cancelAiTask();
        return;
      }
      const input = event.target.querySelector(".ai-prompt-input");
      if (!input?.value.trim()) {
        input?.focus();
        return;
      }
      startAiTask(input.value);
    });

    window.addEventListener("hashchange", () => {
      hideAiTooltip();
      document.body.classList.remove("table-settings-open");
      activeTableSettingsId = "";
      renderPage();
      renderTableSettingsDrawer();
    });
    initAccessGate();
    if (!location.hash) {
      location.hash = "#/home";
    } else {
      renderPage();
    }
  </script>
</body>
</html>
